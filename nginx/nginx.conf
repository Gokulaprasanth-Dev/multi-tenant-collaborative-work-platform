worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # Hide nginx version
  server_tokens off;

  # Upstream: app containers on port 3000
  upstream app_backend {
    server app:3000;
    keepalive 32;
  }

  # HTTP → HTTPS redirect (production)
  # For local dev this server block handles all traffic directly
  server {
    listen 80;
    server_name _;

    # Health probe from load balancer — no redirect
    location /live {
      proxy_pass http://app_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://app_backend;
      proxy_http_version 1.1;

      # Required for WebSocket (Socket.IO) upgrade
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_read_timeout 90s;
      proxy_connect_timeout 10s;
      proxy_send_timeout 90s;
    }
  }

  # HTTPS server — uncomment and configure certs for production use
  # server {
  #   listen 443 ssl http2;
  #   server_name yourdomain.com;
  #
  #   ssl_certificate     /etc/nginx/certs/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/certs/privkey.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
  #   ssl_session_cache   shared:SSL:10m;
  #   ssl_session_timeout 10m;
  #
  #   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  #
  #   location / {
  #     proxy_pass http://app_backend;
  #     proxy_http_version 1.1;
  #     proxy_set_header Upgrade $http_upgrade;
  #     proxy_set_header Connection "upgrade";
  #     proxy_set_header Host $host;
  #     proxy_set_header X-Real-IP $remote_addr;
  #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #     proxy_set_header X-Forwarded-Proto https;
  #     proxy_read_timeout 90s;
  #   }
  # }
}
